workflow:
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true" && $GITLAB_USER_LOGIN == $DEPLOY_TRIGGER_LOGIN'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true" && $GITLAB_USER_LOGIN == $DEPLOY_TRIGGER_LOGIN'
    - when: never

stages:
  - build
  - deploy
  - release

default:
  interruptible: true

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "0"

build_release:
  stage: build
  image: golang:1.23-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true" && $GITLAB_USER_LOGIN == $DEPLOY_TRIGGER_LOGIN'
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true" && $GITLAB_USER_LOGIN == $DEPLOY_TRIGGER_LOGIN'
  before_script:
    - apk add --no-cache nodejs npm curl
    - test -n "${DEPLOY_TRIGGER_LOGIN:-}" || { echo "缺少 DEPLOY_TRIGGER_LOGIN CI 变量"; exit 1; }
  script:
    - npm ci
    - npm run build
    - mkdir -p build/panel artifacts/agent
    - |
      PANEL_GO_BUILD_ARGS=""
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        PANEL_GO_BUILD_ARGS="-tags=release_embed"
      fi
      go build ${PANEL_GO_BUILD_ARGS} -o build/panel/mxinhy-panel ./cmd/mxinhy-panel
    - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o artifacts/agent/mxinhy-agent-linux-amd64 ./cmd/mxinhy-agent
    - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o artifacts/agent/mxinhy-agent-linux-arm64 ./cmd/mxinhy-agent
    - rm -rf build/release-root
    - mkdir -p build/release-root/build/panel
    - mkdir -p build/release-root/artifacts
    - mkdir -p build/release-root/config
    - mkdir -p build/release-root/database/migrations
    - mkdir -p build/release-root/deploy
    - cp build/panel/mxinhy-panel build/release-root/build/panel/mxinhy-panel
    - cp -R artifacts/agent build/release-root/artifacts/
    - cp config/panel.env.example build/release-root/config/panel.env.example
    - cp database/schema.sql build/release-root/database/schema.sql
    - cp database/migrations/*.sql build/release-root/database/migrations/
    - cp -R deploy/systemd build/release-root/deploy/
    - |
      if [ -z "${CI_COMMIT_TAG:-}" ]; then
        cp -R public build/release-root/public
      fi
    - cp package.json build/release-root/package.json
    - tar -czf hysteria2-plan.tar.gz -C build/release-root .
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file hysteria2-plan.tar.gz "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mxinhy-runtime/${CI_COMMIT_TAG}/hysteria2-plan.tar.gz"
      fi
  artifacts:
    name: "hysteria2-plan-${CI_COMMIT_SHA}"
    expire_in: 1 day
    paths:
      - hysteria2-plan.tar.gz

deploy_production:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true" && $GITLAB_USER_LOGIN == $DEPLOY_TRIGGER_LOGIN && $SKIP_PRODUCTION_DEPLOY != "1"'
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true" && $GITLAB_USER_LOGIN == $DEPLOY_TRIGGER_LOGIN && $SKIP_PRODUCTION_DEPLOY != "1"'
  before_script:
    - apk add --no-cache openssh-client bash
    - test -n "${DEPLOY_TRIGGER_LOGIN:-}" || { echo "缺少 DEPLOY_TRIGGER_LOGIN CI 变量"; exit 1; }
    - test -n "${SSH_PRIVATE_KEY:-}" || { echo "缺少 SSH_PRIVATE_KEY CI 变量"; exit 1; }
    - test -n "${DEPLOY_HOST:-}" || { echo "缺少 DEPLOY_HOST CI 变量"; exit 1; }
    - test -n "${DEPLOY_USER:-}" || { echo "缺少 DEPLOY_USER CI 变量"; exit 1; }
    - test -n "${DEPLOY_PATH:-}" || { echo "缺少 DEPLOY_PATH CI 变量"; exit 1; }
    - bash scripts/ci/prepare_ssh.sh
  script:
    - bash scripts/ci/deploy_release.sh hysteria2-plan.tar.gz
  environment:
    name: production

release_version:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_PROTECTED == "true" && $GITLAB_USER_LOGIN == $DEPLOY_TRIGGER_LOGIN'
  script:
    - echo "为 ${CI_COMMIT_TAG} 创建 GitLab Release"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Release $CI_COMMIT_TAG'
    description: |
      自动发布于 GitLab CI。

      - 提交: `$CI_COMMIT_SHA`
      - 流水线: `$CI_PIPELINE_URL`
    assets:
      links:
        - name: 'hysteria2-plan'
          url: '${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mxinhy-runtime/${CI_COMMIT_TAG}/hysteria2-plan.tar.gz'
          link_type: package
